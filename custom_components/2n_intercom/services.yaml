answer_call:
  name: Answer call
  description: Answer the active 2N Intercom call session or a specific session.
  target:
    config_entry:
      integration: 2n_intercom
  fields:
    config_entry_id:
      name: Config entry ID
      description: Target a specific 2N Intercom config entry when more than one is loaded.
      example: "0123456789abcdef0123456789abcdef"
      selector:
        text:
    session_id:
      name: Session ID
      description: Override the active call session to answer.
      example: "session-123"
      selector:
        text:

hangup_call:
  name: Hang up call
  description: Hang up the active 2N Intercom call session or a specific session.
  target:
    config_entry:
      integration: 2n_intercom
  fields:
    config_entry_id:
      name: Config entry ID
      description: Target a specific 2N Intercom config entry when more than one is loaded.
      example: "0123456789abcdef0123456789abcdef"
      selector:
        text:
    session_id:
      name: Session ID
      description: Override the active call session to hang up.
      example: "session-123"
      selector:
        text:
    reason:
      name: Reason
      description: Hangup reason sent to the device.
      default: normal
      example: normal
      selector:
        select:
          options:
            - normal
            - rejected
            - busy
