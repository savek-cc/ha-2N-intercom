# Strict mypy configuration for use with a local HA core checkout.
#
# Resolves real homeassistant types instead of treating them as Any, so
# class-hierarchy, return-type and protocol errors are caught properly.
#
# Usage (symlink workaround for the non-importable "2n_intercom" name):
#
#   ln -sfn 2n_intercom custom_components/_2n_intercom_typecheck
#   MYPYPATH=/path/to/home-assistant-core \
#       mypy --config-file mypy-ha.ini custom_components/_2n_intercom_typecheck/
#   rm custom_components/_2n_intercom_typecheck

[mypy]
python_version = 3.14
strict = true
follow_imports = silent
warn_unused_ignores = false
warn_return_any = true
warn_redundant_casts = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
disable_error_code = import-not-found, import-untyped
